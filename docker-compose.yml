version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: code_review_db
    environment:
      POSTGRES_USER: reviewer
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: code_review
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Code Review Agent
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code_review_agent
    environment:
      DATABASE_URL: postgresql+asyncpg://reviewer:${DB_PASSWORD:-changeme}@postgres:5432/code_review
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      LOG_LEVEL: INFO
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker-in-Docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - code_review_network

volumes:
  postgres_data:

networks:
  code_review_network:
    driver: bridge
